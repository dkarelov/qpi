name: Deploy Functions (Manual)

on:
  workflow_dispatch:
    inputs:
      preflight_only:
        description: "Run validation, preflight checks, and bundle builds without publishing functions"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  PSQLDEF_VERSION: v3.9.8

jobs:
  lint-and-fast-tests:
    uses: ./.github/workflows/_fast_validation.yml
    secrets: inherit

  determine-targets:
    runs-on: ubuntu-latest
    needs: lint-and-fast-tests
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
      requires_migration: ${{ steps.targets.outputs.requires_migration }}
    steps:
      - name: Resolve manual deploy targets
        id: targets
        run: |
          {
            echo "targets=daily_report_scrapper order_tracker blockchain_checker"
            echo "has_targets=true"
            echo "requires_migration=true"
          } >> "${GITHUB_OUTPUT}"

  start-private-runner:
    runs-on: ubuntu-latest
    needs: determine-targets
    if: ${{ needs.determine-targets.outputs.has_targets == 'true' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      PRIVATE_RUNNER_INSTANCE_NAME: ${{ vars.PRIVATE_RUNNER_INSTANCE_NAME }}
      PRIVATE_RUNNER_SSH_USER: ${{ vars.PRIVATE_RUNNER_SSH_USER }}
      PRIVATE_RUNNER_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_RUNNER_SSH_PRIVATE_KEY }}
      PRIVATE_RUNNER_BOOTSTRAP_TOKEN: ${{ secrets.PRIVATE_RUNNER_BOOTSTRAP_TOKEN }}
      PRIVATE_RUNNER_REPO: ${{ github.repository }}
      PRIVATE_RUNNER_LABELS: ${{ vars.PRIVATE_RUNNER_LABELS }}
      PRIVATE_RUNNER_VERSION: ${{ vars.PRIVATE_RUNNER_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "false"
          install-yc: "true"

      - name: Validate required runner secrets
        run: |
          test -n "${YC_TOKEN}" || { echo "YC_TOKEN is required"; exit 1; }
          test -n "${YC_FOLDER_ID}" || { echo "YC_FOLDER_ID is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_INSTANCE_NAME}" || { echo "PRIVATE_RUNNER_INSTANCE_NAME is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_SSH_PRIVATE_KEY}" || { echo "PRIVATE_RUNNER_SSH_PRIVATE_KEY is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_BOOTSTRAP_TOKEN}" || { echo "PRIVATE_RUNNER_BOOTSTRAP_TOKEN is required"; exit 1; }

      - name: Start private runner
        run: scripts/deploy/private_runner.sh ensure-ready

  private-db-validation:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - determine-targets
      - start-private-runner
    if: ${{ needs.determine-targets.outputs.has_targets == 'true' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_SCRATCH_DATABASE_URL: ${{ secrets.TEST_SCRATCH_DATABASE_URL }}
      QPI_DB_VM_HOST: ${{ vars.DB_VM_HOST }}
      QPI_DB_VM_SSH_USER: ${{ vars.DB_VM_SSH_USER }}
      QPI_DB_VM_SSH_PRIVATE_KEY: ${{ secrets.DB_VM_SSH_PRIVATE_KEY }}
      REQUIRES_MIGRATION: ${{ needs.determine-targets.outputs.requires_migration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-postgresql-client: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: DB-backed validation
        run: |
          scripts/dev/run_db_tests_on_runner.sh integration
          scripts/dev/run_db_tests_on_runner.sh schema-compat
          if [[ "${REQUIRES_MIGRATION}" == "true" ]]; then
            scripts/dev/run_db_tests_on_runner.sh migration-smoke
          fi

  predeploy-functions:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - determine-targets
      - private-db-validation
    if: ${{ needs.determine-targets.outputs.has_targets == 'true' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      BOT_VM_INSTANCE_GROUP_NAME: ${{ vars.BOT_VM_INSTANCE_GROUP_NAME }}
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-yc: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Preflight function deploy
        run: scripts/deploy/preflight.sh functions

  build-function-bundles:
    runs-on: ubuntu-latest
    needs:
      - determine-targets
      - predeploy-functions
    if: ${{ needs.determine-targets.outputs.has_targets == 'true' }}
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TARGETS: ${{ needs.determine-targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-zip: "true"
          configure-private-git-auth: "true"

      - name: Build function bundles
        run: |
          bundle_dir="${RUNNER_TEMP}/function-bundles"
          mkdir -p "${bundle_dir}"
          : > "${bundle_dir}/manifest.tsv"

          for target in ${TARGETS}; do
            metadata="$(scripts/deploy/function.sh metadata "${target}")"
            bundle_path="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["zip_path"])' "${metadata}")"
            sha256="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["sha256"])' "${metadata}")"
            cp "${bundle_path}" "${bundle_dir}/${target}.zip"
            cp "${bundle_path}.sha256" "${bundle_dir}/${target}.zip.sha256"
            printf '%s\t%s\n' "${target}" "${sha256}" >> "${bundle_dir}/manifest.tsv"
          done

      - name: Upload function bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: function-bundles-${{ github.sha }}
          path: ${{ runner.temp }}/function-bundles
          if-no-files-found: error

  deploy-functions:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - determine-targets
      - predeploy-functions
      - build-function-bundles
    if: >-
      ${{
        needs.determine-targets.outputs.has_targets == 'true' &&
        github.event.inputs.preflight_only != 'true'
      }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      BOT_VM_INSTANCE_GROUP_NAME: ${{ vars.BOT_VM_INSTANCE_GROUP_NAME }}
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      TARGETS: ${{ needs.determine-targets.outputs.targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-yc: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Download function bundles
        uses: actions/download-artifact@v5
        with:
          name: function-bundles-${{ github.sha }}
          path: ${{ runner.temp }}/function-bundles

      - name: Publish functions from prebuilt bundles
        run: |
          for target in ${TARGETS}; do
            QPI_FUNCTION_BUNDLE_PATH="${RUNNER_TEMP}/function-bundles/${target}.zip" \
              scripts/deploy/function.sh "${target}"
          done
