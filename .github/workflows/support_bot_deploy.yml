name: Support Bot Deploy

on:
  push:
    branches: ["main"]
    paths:
      - "apps/support-bot/**"
      - "infra/cloud-init/support_bot.yaml.tftpl"
      - "infra/scripts/remote_rollout_support_bot.sh"
      - "scripts/deploy/support_bot.sh"
  workflow_dispatch:
    inputs:
      preflight_only:
        description: "Run image build/push and deploy preflight checks without rollout"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
      registry_id: ${{ steps.meta.outputs.registry_id }}
      registry_present: ${{ steps.meta.outputs.registry_present }}
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      SUPPORT_BOT_CONTAINER_REGISTRY_NAME: ${{ vars.SUPPORT_BOT_CONTAINER_REGISTRY_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/support-bot/upstream/package-lock.json

      - name: Setup yc CLI
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "false"
          install-yc: "true"

      - name: Install dependencies
        working-directory: apps/support-bot/upstream
        run: npm ci

      - name: Build upstream app
        working-directory: apps/support-bot/upstream
        run: npm run build

      - name: Run upstream tests
        working-directory: apps/support-bot/upstream
        run: npm test

      - name: Resolve image metadata
        id: meta
        run: |
          yc config set token "${YC_TOKEN}" >/dev/null
          yc config set folder-id "${YC_FOLDER_ID}" >/dev/null
          registry_name="${SUPPORT_BOT_CONTAINER_REGISTRY_NAME:-qpi-support-bot-registry}"
          if ! registry_json="$(yc container registry get --name "${registry_name}" --folder-id "${YC_FOLDER_ID}" --format json 2>/tmp/support-bot-registry.err)"; then
            if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
              {
                echo "registry_present=false"
                echo "registry_id="
                echo "image_ref="
              } >> "${GITHUB_OUTPUT}"
              {
                echo "## Support Bot Deploy"
                echo
                echo "Skipping auto-deploy because container registry \`${registry_name}\` does not exist yet."
                echo "Apply the Terraform change first, then rerun the workflow manually."
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
            cat /tmp/support-bot-registry.err >&2
            exit 1
          fi
          registry_id="$(printf '%s' "${registry_json}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); registry_id=payload.get("id"); assert registry_id, "Failed to resolve support-bot container registry id."; print(registry_id)')"
          image_ref="cr.yandex/${registry_id}/support-bot:${GITHUB_SHA}"
          {
            echo "registry_present=true"
            echo "registry_id=${registry_id}"
            echo "image_ref=${image_ref}"
          } >> "${GITHUB_OUTPUT}"

      - name: Authenticate Docker to Yandex Container Registry
        if: ${{ steps.meta.outputs.registry_present == 'true' }}
        run: |
          yc config set token "${YC_TOKEN}" >/dev/null
          yc config set folder-id "${YC_FOLDER_ID}" >/dev/null
          registry_token="$(yc iam create-token)"
          printf '%s' "${registry_token}" | docker login --username iam --password-stdin cr.yandex

      - name: Build and push production image
        if: ${{ steps.meta.outputs.registry_present == 'true' }}
        run: |
          docker build -f apps/support-bot/Dockerfile -t "${{ steps.meta.outputs.image_ref }}" apps/support-bot
          docker push "${{ steps.meta.outputs.image_ref }}"

  start-private-runner:
    runs-on: ubuntu-latest
    needs: build-image
    if: ${{ needs.build-image.outputs.registry_present == 'true' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      PRIVATE_RUNNER_INSTANCE_NAME: ${{ vars.PRIVATE_RUNNER_INSTANCE_NAME }}
      PRIVATE_RUNNER_SSH_USER: ${{ vars.PRIVATE_RUNNER_SSH_USER }}
      PRIVATE_RUNNER_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_RUNNER_SSH_PRIVATE_KEY }}
      PRIVATE_RUNNER_BOOTSTRAP_TOKEN: ${{ secrets.PRIVATE_RUNNER_BOOTSTRAP_TOKEN }}
      PRIVATE_RUNNER_REPO: ${{ github.repository }}
      PRIVATE_RUNNER_LABELS: ${{ vars.PRIVATE_RUNNER_LABELS }}
      PRIVATE_RUNNER_VERSION: ${{ vars.PRIVATE_RUNNER_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup yc CLI
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "false"
          install-yc: "true"

      - name: Validate required runner secrets
        run: |
          test -n "${YC_TOKEN}" || { echo "YC_TOKEN is required"; exit 1; }
          test -n "${YC_FOLDER_ID}" || { echo "YC_FOLDER_ID is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_INSTANCE_NAME}" || { echo "PRIVATE_RUNNER_INSTANCE_NAME is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_SSH_PRIVATE_KEY}" || { echo "PRIVATE_RUNNER_SSH_PRIVATE_KEY is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_BOOTSTRAP_TOKEN}" || { echo "PRIVATE_RUNNER_BOOTSTRAP_TOKEN is required"; exit 1; }

      - name: Start private runner
        run: scripts/deploy/private_runner.sh ensure-ready

  predeploy-support-bot:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - build-image
      - start-private-runner
    if: ${{ needs.build-image.outputs.registry_present == 'true' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      SUPPORT_BOT_INSTANCE_GROUP_NAME: ${{ vars.SUPPORT_BOT_INSTANCE_GROUP_NAME }}
      SUPPORT_BOT_VM_SSH_USER: ${{ vars.SUPPORT_BOT_VM_SSH_USER }}
      SUPPORT_BOT_TELEGRAM_BOT_TOKEN: ${{ secrets.SUPPORT_BOT_TELEGRAM_BOT_TOKEN }}
      SUPPORT_BOT_STAFFCHAT_ID: ${{ vars.SUPPORT_BOT_STAFFCHAT_ID }}
      SUPPORT_BOT_OWNER_ID: ${{ vars.SUPPORT_BOT_OWNER_ID }}
      SUPPORT_BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup yc CLI
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "false"
          install-yc: "true"

      - name: Preflight support-bot deploy
        run: scripts/deploy/preflight.sh support-bot

  deploy-support-bot:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - build-image
      - predeploy-support-bot
    if: >-
      ${{
        needs.build-image.outputs.registry_present == 'true' &&
        github.event.inputs.preflight_only != 'true'
      }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      SUPPORT_BOT_INSTANCE_GROUP_NAME: ${{ vars.SUPPORT_BOT_INSTANCE_GROUP_NAME }}
      SUPPORT_BOT_VM_SSH_USER: ${{ vars.SUPPORT_BOT_VM_SSH_USER }}
      SUPPORT_BOT_TELEGRAM_BOT_TOKEN: ${{ secrets.SUPPORT_BOT_TELEGRAM_BOT_TOKEN }}
      SUPPORT_BOT_STAFFCHAT_ID: ${{ vars.SUPPORT_BOT_STAFFCHAT_ID }}
      SUPPORT_BOT_OWNER_ID: ${{ vars.SUPPORT_BOT_OWNER_ID }}
      SUPPORT_BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      SUPPORT_BOT_RELEASE_ID: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup yc CLI
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "false"
          install-yc: "true"

      - name: Deploy support bot
        run: scripts/deploy/support_bot.sh "${{ needs.build-image.outputs.image_ref }}"
