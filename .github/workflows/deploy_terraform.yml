name: Deploy Terraform

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - "scripts/deploy/function.sh"
      - "scripts/common/setup_private_git_auth.sh"
      - ".github/workflows/deploy_terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply (requires shared state backend configured for CI)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TF_VAR_cf_token_cipher_key: ${{ secrets.TOKEN_CIPHER_KEY }}
      TF_VAR_tonapi_api_key: ${{ secrets.TONAPI_API_KEY }}
      TF_VAR_folder_id: ${{ vars.YC_FOLDER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${YC_TOKEN}" || { echo "YC_TOKEN is required"; exit 1; }
          test -n "${GH_TOKEN}" || { echo "TOKEN_YC_JSON_LOGGER secret is required for private GitHub packages"; exit 1; }
          test -n "${TF_VAR_cf_token_cipher_key}" || { echo "TOKEN_CIPHER_KEY is required"; exit 1; }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infra init -input=false

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Plan
        run: |
          terraform -chdir=infra plan -input=false -no-color

      - name: Guard apply without shared CI state
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
        run: |
          if [[ ! -f "infra/terraform.tfstate" ]]; then
            echo "Refusing terraform apply in CI without shared backend state."
            echo "Current backend is local state; configure remote backend before enabling CI apply."
            exit 1
          fi

      - name: Terraform Apply
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
        run: |
          terraform -chdir=infra apply -input=false -auto-approve -no-color
