name: Deploy Terraform

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - "services/**"
      - "libs/**"
      - "schema/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/deploy_terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      TOKEN_YC_JSON_LOGGER: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TF_VAR_cf_token_cipher_key: ${{ secrets.TOKEN_CIPHER_KEY }}
      TF_VAR_tonapi_api_key: ${{ secrets.TONAPI_API_KEY }}
      TF_VAR_folder_id: ${{ vars.YC_FOLDER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${YC_TOKEN}" || { echo "YC_TOKEN is required"; exit 1; }
          test -n "${TOKEN_YC_JSON_LOGGER}" || { echo "TOKEN_YC_JSON_LOGGER is required"; exit 1; }
          test -n "${TF_VAR_cf_token_cipher_key}" || { echo "TOKEN_CIPHER_KEY is required"; exit 1; }

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infra init -input=false

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Plan
        run: |
          infra/scripts/with_private_requirements.sh -- \
            terraform -chdir=infra plan -input=false -no-color

      - name: Terraform Apply
        run: |
          infra/scripts/with_private_requirements.sh -- \
            terraform -chdir=infra apply -input=false -auto-approve -no-color
