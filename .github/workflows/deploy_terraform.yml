name: Deploy Terraform

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - "services/**"
      - "libs/**"
      - "schema/**"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/deploy_terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      TOKEN_YC_JSON_LOGGER: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TF_VAR_folder_id: ${{ vars.YC_FOLDER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject private dependency token into requirements (CI workspace only)
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          token = os.environ.get("TOKEN_YC_JSON_LOGGER", "").strip()
          if not token:
              raise SystemExit("TOKEN_YC_JSON_LOGGER is required")

          path = Path("requirements.txt")
          source = path.read_text(encoding="utf-8")
          placeholder = "${TOKEN_YC_JSON_LOGGER}"
          if placeholder not in source:
              raise SystemExit(f"Missing placeholder in {path}")

          path.write_text(source.replace(placeholder, token), encoding="utf-8")
          PY

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform -chdir=infra init -input=false

      - name: Terraform Validate
        run: terraform -chdir=infra validate

      - name: Terraform Plan
        run: terraform -chdir=infra plan -input=false -no-color

      - name: Terraform Apply
        run: terraform -chdir=infra apply -input=false -auto-approve -no-color
