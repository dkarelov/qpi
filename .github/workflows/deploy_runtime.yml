name: Deploy Runtime (Manual)

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "Commit SHA to deploy (defaults to the workflow ref SHA)"
        required: false
        type: string
      validation_mode:
        description: "Deploy validation policy"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - release-grade
      preflight_only:
        description: "Run validation, preflight checks, and artifact build without rollout"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: read

env:
  PSQLDEF_VERSION: v3.9.8

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      target_sha: ${{ steps.resolve.outputs.target_sha }}
      deploy_mode: ${{ steps.resolve.outputs.deploy_mode }}
      on_main: ${{ steps.resolve.outputs.on_main }}
      green_post_merge: ${{ steps.resolve.outputs.green_post_merge }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve target SHA and deploy mode
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA_INPUT: ${{ inputs.sha }}
          VALIDATION_MODE: ${{ inputs.validation_mode }}
        run: |
          target_sha="${TARGET_SHA_INPUT:-${GITHUB_SHA}}"
          if ! git cat-file -e "${target_sha}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=2 origin "${target_sha}"
          fi
          target_sha="$(git rev-parse "${target_sha}^{commit}")"
          git fetch --no-tags origin main --depth=1

          on_main=false
          if git merge-base --is-ancestor "${target_sha}" origin/main; then
            on_main=true
          fi

          green_post_merge=false
          if [[ "${on_main}" == "true" ]]; then
            run_count="$(
              gh api "/repos/${GITHUB_REPOSITORY}/actions/workflows/post_merge.yml/runs?event=push&branch=main&status=success&head_sha=${target_sha}&per_page=1" \
                --jq '.total_count'
            )"
            if [[ "${run_count}" =~ ^[1-9][0-9]*$ ]]; then
              green_post_merge=true
            fi
          fi

          deploy_mode="release-grade"
          if [[ "${VALIDATION_MODE}" == "auto" && "${on_main}" == "true" && "${green_post_merge}" == "true" ]]; then
            deploy_mode="hotfix"
          fi

          {
            echo "target_sha=${target_sha}"
            echo "deploy_mode=${deploy_mode}"
            echo "on_main=${on_main}"
            echo "green_post_merge=${green_post_merge}"
          } >> "${GITHUB_OUTPUT}"

  lint-and-fast-tests:
    needs: resolve-target
    if: ${{ needs.resolve-target.outputs.deploy_mode == 'release-grade' }}
    uses: ./.github/workflows/_fast_validation.yml
    with:
      checkout_ref: ${{ needs.resolve-target.outputs.target_sha }}
    secrets: inherit

  start-private-runner:
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - lint-and-fast-tests
    if: ${{ needs.resolve-target.outputs.deploy_mode == 'release-grade' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      PRIVATE_RUNNER_INSTANCE_NAME: ${{ vars.PRIVATE_RUNNER_INSTANCE_NAME }}
      PRIVATE_RUNNER_SSH_USER: ${{ vars.PRIVATE_RUNNER_SSH_USER }}
      PRIVATE_RUNNER_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_RUNNER_SSH_PRIVATE_KEY }}
      PRIVATE_RUNNER_BOOTSTRAP_TOKEN: ${{ secrets.PRIVATE_RUNNER_BOOTSTRAP_TOKEN }}
      PRIVATE_RUNNER_REPO: ${{ github.repository }}
      PRIVATE_RUNNER_LABELS: ${{ vars.PRIVATE_RUNNER_LABELS }}
      PRIVATE_RUNNER_VERSION: ${{ vars.PRIVATE_RUNNER_VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "false"
          install-yc: "true"

      - name: Validate required runner secrets
        run: |
          test -n "${YC_TOKEN}" || { echo "YC_TOKEN is required"; exit 1; }
          test -n "${YC_FOLDER_ID}" || { echo "YC_FOLDER_ID is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_INSTANCE_NAME}" || { echo "PRIVATE_RUNNER_INSTANCE_NAME is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_SSH_PRIVATE_KEY}" || { echo "PRIVATE_RUNNER_SSH_PRIVATE_KEY is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_BOOTSTRAP_TOKEN}" || { echo "PRIVATE_RUNNER_BOOTSTRAP_TOKEN is required"; exit 1; }

      - name: Start private runner
        run: scripts/deploy/private_runner.sh ensure-ready

  private-db-validation:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - resolve-target
      - start-private-runner
    if: ${{ needs.resolve-target.outputs.deploy_mode == 'release-grade' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_SCRATCH_DATABASE_URL: ${{ secrets.TEST_SCRATCH_DATABASE_URL }}
      QPI_DB_VM_HOST: ${{ vars.DB_VM_HOST }}
      QPI_DB_VM_SSH_USER: ${{ vars.DB_VM_SSH_USER }}
      QPI_DB_VM_SSH_PRIVATE_KEY: ${{ secrets.DB_VM_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-postgresql-client: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: DB-backed validation
        run: scripts/dev/run_db_tests_on_runner.sh all

  predeploy-runtime-release:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - resolve-target
      - private-db-validation
    if: ${{ needs.resolve-target.outputs.deploy_mode == 'release-grade' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      BOT_VM_INSTANCE_GROUP_NAME: ${{ vars.BOT_VM_INSTANCE_GROUP_NAME }}
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TOKEN_CIPHER_KEY: ${{ secrets.TOKEN_CIPHER_KEY }}
      BOT_WEBHOOK_SECRET_TOKEN: ${{ secrets.BOT_WEBHOOK_SECRET_TOKEN }}
      DEPLOY_BASE_SHA: ${{ needs.resolve-target.outputs.target_sha }}^
      DEPLOY_HEAD_SHA: ${{ needs.resolve-target.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 2

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-yc: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Preflight runtime deploy
        run: scripts/deploy/preflight.sh runtime

  predeploy-runtime-hotfix:
    runs-on: ubuntu-latest
    needs: resolve-target
    if: ${{ needs.resolve-target.outputs.deploy_mode == 'hotfix' }}
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      BOT_VM_INSTANCE_GROUP_NAME: ${{ vars.BOT_VM_INSTANCE_GROUP_NAME }}
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TOKEN_CIPHER_KEY: ${{ secrets.TOKEN_CIPHER_KEY }}
      BOT_WEBHOOK_SECRET_TOKEN: ${{ secrets.BOT_WEBHOOK_SECRET_TOKEN }}
      DEPLOY_BASE_SHA: ${{ needs.resolve-target.outputs.target_sha }}^
      DEPLOY_HEAD_SHA: ${{ needs.resolve-target.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 2

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-yc: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Preflight runtime deploy
        run: scripts/deploy/preflight.sh runtime

  build-runtime-artifact:
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - predeploy-runtime-release
      - predeploy-runtime-hotfix
    if: >-
      ${{
        needs.predeploy-runtime-release.result == 'success' ||
        needs.predeploy-runtime-hotfix.result == 'success'
      }}
    outputs:
      artifact_name: ${{ steps.build.outputs.artifact_name }}
      archive_file: ${{ steps.build.outputs.archive_file }}
      archive_sha256: ${{ steps.build.outputs.archive_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}

      - name: Build runtime artifact
        id: build
        env:
          QPI_RELEASE_ID: ${{ needs.resolve-target.outputs.target_sha }}
        run: |
          metadata="$(scripts/deploy/runtime.sh metadata)"
          archive_path="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["archive_path"])' "${metadata}")"
          archive_sha256="$(python3 -c 'import json,sys; print(json.loads(sys.argv[1])["sha256"])' "${metadata}")"
          archive_file="qpi-bot-${QPI_RELEASE_ID}.tar.gz"
          cp "${archive_path}" "${RUNNER_TEMP}/${archive_file}"
          {
            echo "artifact_name=runtime-artifact-${QPI_RELEASE_ID}"
            echo "archive_file=${archive_file}"
            echo "archive_sha256=${archive_sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.build.outputs.archive_file }}
          if-no-files-found: error

  deploy-runtime-hotfix:
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - predeploy-runtime-hotfix
      - build-runtime-artifact
    if: >-
      ${{
        needs.resolve-target.outputs.deploy_mode == 'hotfix' &&
        github.event.inputs.preflight_only != 'true'
      }}
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      BOT_VM_INSTANCE_GROUP_NAME: ${{ vars.BOT_VM_INSTANCE_GROUP_NAME }}
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_HEALTH_PORT: ${{ vars.BOT_HEALTH_PORT }}
      ADMIN_TELEGRAM_IDS: ${{ vars.ADMIN_TELEGRAM_IDS }}
      SUPPORT_BOT_USERNAME: ${{ vars.SUPPORT_BOT_USERNAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TOKEN_CIPHER_KEY: ${{ secrets.TOKEN_CIPHER_KEY }}
      BOT_WEBHOOK_SECRET_TOKEN: ${{ secrets.BOT_WEBHOOK_SECRET_TOKEN }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      DEPLOY_BASE_SHA: ${{ needs.resolve-target.outputs.target_sha }}^
      DEPLOY_HEAD_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      QPI_RELEASE_ID: ${{ needs.resolve-target.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 2

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-yc: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Download runtime artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build-runtime-artifact.outputs.artifact_name }}
          path: ${{ runner.temp }}/runtime-artifact

      - name: Deploy runtime from prebuilt artifact
        run: |
          QPI_RUNTIME_ARCHIVE_PATH="${RUNNER_TEMP}/runtime-artifact/${{ needs.build-runtime-artifact.outputs.archive_file }}" \
            scripts/deploy/runtime.sh deploy

  deploy-runtime-release:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - resolve-target
      - predeploy-runtime-release
      - build-runtime-artifact
    if: >-
      ${{
        needs.resolve-target.outputs.deploy_mode == 'release-grade' &&
        github.event.inputs.preflight_only != 'true'
      }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      BOT_VM_INSTANCE_GROUP_NAME: ${{ vars.BOT_VM_INSTANCE_GROUP_NAME }}
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_HEALTH_PORT: ${{ vars.BOT_HEALTH_PORT }}
      ADMIN_TELEGRAM_IDS: ${{ vars.ADMIN_TELEGRAM_IDS }}
      SUPPORT_BOT_USERNAME: ${{ vars.SUPPORT_BOT_USERNAME }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TOKEN_CIPHER_KEY: ${{ secrets.TOKEN_CIPHER_KEY }}
      BOT_WEBHOOK_SECRET_TOKEN: ${{ secrets.BOT_WEBHOOK_SECRET_TOKEN }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      DEPLOY_BASE_SHA: ${{ needs.resolve-target.outputs.target_sha }}^
      DEPLOY_HEAD_SHA: ${{ needs.resolve-target.outputs.target_sha }}
      QPI_RELEASE_ID: ${{ needs.resolve-target.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-target.outputs.target_sha }}
          fetch-depth: 2

      - name: Setup shared bootstrap
        uses: ./.github/actions/setup-qpi-deploy
        with:
          install-yc: "true"
          install-psqldef: "true"
          configure-private-git-auth: "true"
          psqldef-version: ${{ env.PSQLDEF_VERSION }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Download runtime artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.build-runtime-artifact.outputs.artifact_name }}
          path: ${{ runner.temp }}/runtime-artifact

      - name: Deploy runtime from prebuilt artifact
        run: |
          QPI_RUNTIME_ARCHIVE_PATH="${RUNNER_TEMP}/runtime-artifact/${{ needs.build-runtime-artifact.outputs.archive_file }}" \
            scripts/deploy/runtime.sh deploy
