name: Support Bot CI

on:
  pull_request:
    paths:
      - "apps/support-bot/**"
      - "infra/support_bot*.tf"
      - "infra/cloud-init/support_bot.yaml.tftpl"
      - "infra/scripts/remote_rollout_support_bot.sh"
      - "scripts/deploy/support_bot.sh"
      - ".github/workflows/support_bot_ci.yml"
      - ".github/workflows/support_bot_deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  support-bot-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: apps/support-bot/upstream/.python-version

      - name: Setup uv
        uses: ./.github/actions/setup-qpi-deploy
        with:
          setup-python: "false"
          install-uv: "true"
          install-yc: "false"

      - name: Install CI lint tools
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          if ! command -v actionlint >/dev/null 2>&1; then
            scripts/dev/install_actionlint.sh "${HOME}/.local/bin"
            echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          fi

      - name: Install Python dependencies
        working-directory: apps/support-bot/upstream
        run: uv sync --locked

      - name: Run Ruff
        working-directory: apps/support-bot/upstream
        run: uv run ruff check .

      - name: Run mypy
        working-directory: apps/support-bot/upstream
        run: >-
          uv run mypy
          app/config.py
          app/bot/storage.py
          app/bot/support_context.py
          app/bot/support_runtime.py
          app/bot/support_topics.py
          app/bot/newsletter.py
          app/bot/postgres_smoke.py
          app/bot/telegram_client.py

      - name: Run support-bot tests
        working-directory: apps/support-bot/upstream
        run: uv run pytest

      - name: Validate workflow and shell files
        run: scripts/dev/check_ci_files.sh

      - name: Build production image
        run: docker build -f apps/support-bot/Dockerfile -t qpi-support-bot-ci:${{ github.sha }} apps/support-bot
