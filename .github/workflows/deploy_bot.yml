name: Deploy Bot Runtime

on:
  push:
    branches: ["main"]
    paths:
      - "services/bot_api/**"
      - "libs/**"
      - "schema/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "infra/scripts/remote_rollout_bot.sh"
      - "infra/scripts/merge_bot_env.py"
      - ".github/workflows/deploy_bot.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PSQLDEF_VERSION: v3.9.8

jobs:
  schema_drift_regression:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: qpi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d qpi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/qpi_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psqldef
        run: |
          curl -fsSL -o /tmp/psqldef.tar.gz \
            "https://github.com/sqldef/sqldef/releases/download/${PSQLDEF_VERSION}/psqldef_linux_amd64.tar.gz"
          tar -xzf /tmp/psqldef.tar.gz -C /tmp
          install -m 0755 /tmp/psqldef /usr/local/bin/psqldef
          psqldef --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run schema drift regression
        run: python -m pytest -q tests/test_runtime_schema_compatibility.py

  deploy_bot:
    runs-on: ubuntu-latest
    needs:
      - schema_drift_regression
    env:
      BOT_VM_HOST: ${{ vars.BOT_VM_HOST }}
      BOT_VM_SSH_USER: ${{ vars.BOT_VM_SSH_USER }}
      BOT_VM_SSH_PORT: ${{ vars.BOT_VM_SSH_PORT }}
      BOT_HEALTH_PORT: ${{ vars.BOT_HEALTH_PORT }}
      ADMIN_TELEGRAM_IDS: ${{ vars.ADMIN_TELEGRAM_IDS }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TOKEN_CIPHER_KEY: ${{ secrets.TOKEN_CIPHER_KEY }}
      BOT_WEBHOOK_SECRET_TOKEN: ${{ secrets.BOT_WEBHOOK_SECRET_TOKEN }}
      BOT_VM_SSH_PRIVATE_KEY: ${{ secrets.BOT_VM_SSH_PRIVATE_KEY }}
      TOKEN_YC_JSON_LOGGER: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deployment secrets
        run: |
          test -n "${BOT_VM_HOST}" || { echo "BOT_VM_HOST variable is required"; exit 1; }
          test -n "${BOT_VM_SSH_PRIVATE_KEY}" || { echo "BOT_VM_SSH_PRIVATE_KEY is required"; exit 1; }
          test -n "${TELEGRAM_BOT_TOKEN}" || { echo "TELEGRAM_BOT_TOKEN is required"; exit 1; }
          test -n "${TOKEN_CIPHER_KEY}" || { echo "TOKEN_CIPHER_KEY is required"; exit 1; }
          test -n "${BOT_WEBHOOK_SECRET_TOKEN}" || { echo "BOT_WEBHOOK_SECRET_TOKEN is required"; exit 1; }
          test -n "${TOKEN_YC_JSON_LOGGER}" || { echo "TOKEN_YC_JSON_LOGGER is required"; exit 1; }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install psqldef
        run: |
          curl -fsSL -o /tmp/psqldef.tar.gz \
            "https://github.com/sqldef/sqldef/releases/download/${PSQLDEF_VERSION}/psqldef_linux_amd64.tar.gz"
          tar -xzf /tmp/psqldef.tar.gz -C /tmp
          install -m 0755 /tmp/psqldef /usr/local/bin/psqldef
          psqldef --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m pytest -q -m "not migration_smoke"

      - name: Build rollout artifact
        id: build
        run: |
          release_id="${GITHUB_SHA::12}"
          archive_name="qpi-bot-${release_id}.tar.gz"
          git archive --format=tar.gz --output="${archive_name}" "${GITHUB_SHA}"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"
          echo "archive_name=${archive_name}" >> "${GITHUB_OUTPUT}"

      - name: Prepare SSH client
        run: |
          install -m 0700 -d ~/.ssh
          install -m 0600 /dev/null ~/.ssh/bot_vm_key
          # Handle both literal newlines and escaped \n secret formats.
          printf '%s' "${BOT_VM_SSH_PRIVATE_KEY}" > ~/.ssh/bot_vm_key
          if ! ssh-keygen -y -f ~/.ssh/bot_vm_key >/dev/null 2>&1; then
            printf '%b' "${BOT_VM_SSH_PRIVATE_KEY}" > ~/.ssh/bot_vm_key
          fi
          # Fallback: allow secret to be provided as base64-encoded private key.
          if ! ssh-keygen -y -f ~/.ssh/bot_vm_key >/dev/null 2>&1; then
            printf '%s' "${BOT_VM_SSH_PRIVATE_KEY}" | base64 -d > ~/.ssh/bot_vm_key
          fi
          # Normalize potential CRLF if secret was pasted from Windows clipboard.
          sed -i 's/\r$//' ~/.ssh/bot_vm_key
          ssh-keygen -y -f ~/.ssh/bot_vm_key >/dev/null
          ssh-keyscan -p "${BOT_VM_SSH_PORT:-22}" "${BOT_VM_HOST}" >> ~/.ssh/known_hosts

      - name: Upload artifact and rollout script
        run: |
          scp -P "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            "${{ steps.build.outputs.archive_name }}" \
            "infra/scripts/remote_rollout_bot.sh" \
            "infra/scripts/merge_bot_env.py" \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}:/tmp/"

      - name: Upload runtime env overrides
        run: |
          cat > /tmp/qpi-bot-overrides.env <<EOF
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TOKEN_CIPHER_KEY=${TOKEN_CIPHER_KEY}
          WEBHOOK_SECRET_TOKEN=${BOT_WEBHOOK_SECRET_TOKEN}
          ADMIN_TELEGRAM_IDS=${ADMIN_TELEGRAM_IDS}
          EOF
          scp -P "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            /tmp/qpi-bot-overrides.env \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}:/tmp/qpi-bot-overrides.env"

      - name: Upload rollout private dependency token
        run: |
          cat > /tmp/qpi-rollout.env <<EOF
          TOKEN_YC_JSON_LOGGER=${TOKEN_YC_JSON_LOGGER}
          EOF
          scp -P "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            /tmp/qpi-rollout.env \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}:/tmp/qpi-rollout.env"

      - name: Merge env overrides on VM
        run: |
          ssh -p "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}" \
            "sudo python3 /tmp/merge_bot_env.py \
              --base /etc/qpi/bot.env \
              --overrides /tmp/qpi-bot-overrides.env && \
          sudo chown root:ubuntu /etc/qpi/bot.env
          sudo chmod 0640 /etc/qpi/bot.env"

      - name: Open production DB tunnel
        run: |
          ssh -fNT -o ExitOnForwardFailure=yes -o ServerAliveInterval=30 -o ServerAliveCountMax=3 \
            -p "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            -L 127.0.0.1:15432:10.131.0.28:5432 \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}"
          ss -ltn | grep ':15432'

      - name: Resolve production DATABASE_URL
        run: |
          remote_db_url="$(
            ssh -p "${BOT_VM_SSH_PORT:-22}" \
              -i ~/.ssh/bot_vm_key \
              "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}" \
              "sudo awk 'index(\$0, \"DATABASE_URL=\") == 1 { sub(/^DATABASE_URL=/, \"\"); print; exit }' /etc/qpi/bot.env"
          )"
          test -n "${remote_db_url}" || { echo "DATABASE_URL missing in /etc/qpi/bot.env"; exit 1; }
          echo "::add-mask::${remote_db_url}"
          tunneled_db_url="$(
            REMOTE_DATABASE_URL="${remote_db_url}" python -c "import os; from urllib.parse import quote, urlparse, urlunparse; raw=os.environ['REMOTE_DATABASE_URL'].strip(); raw='postgresql://'+raw[len('postgres://'):] if raw.startswith('postgres://') else raw; raw='postgresql://'+raw[len('postgresql+psycopg://'):] if raw.startswith('postgresql+psycopg://') else raw; parsed=urlparse(raw); userinfo=''; userinfo=(quote(parsed.username)+((':'+quote(parsed.password)) if parsed.password else '')+'@') if parsed.username else ''; print(urlunparse(parsed._replace(netloc=f'{userinfo}127.0.0.1:15432')))"
          )"
          echo "::add-mask::${tunneled_db_url}"
          echo "PRODUCTION_DATABASE_URL=${tunneled_db_url}" >> "${GITHUB_ENV}"

      - name: Apply production runtime schema compatibility
        run: |
          DATABASE_URL="${PRODUCTION_DATABASE_URL}" \
            python -m libs.db.runtime_schema_compat apply

      - name: Apply production schema
        run: |
          DATABASE_URL="${PRODUCTION_DATABASE_URL}" \
            python -m libs.db.schema_cli apply

      - name: Rollout and verify health
        run: |
          ssh -p "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}" \
            "set -a && source /tmp/qpi-rollout.env && set +a && \
             chmod +x /tmp/remote_rollout_bot.sh && \
             /tmp/remote_rollout_bot.sh \
               '${{ steps.build.outputs.release_id }}' \
               '/tmp/${{ steps.build.outputs.archive_name }}' \
               '${BOT_HEALTH_PORT:-18080}'"

      - name: Post-deploy runtime smoke
        run: |
          ssh -p "${BOT_VM_SSH_PORT:-22}" \
            -i ~/.ssh/bot_vm_key \
            "${BOT_VM_SSH_USER:-ubuntu}@${BOT_VM_HOST}" \
            "set -a && source /etc/qpi/bot.env && set +a && \
             cd /opt/qpi/current && \
             ./.venv/bin/python -m services.bot_api.main \
               --seller-command '/start' \
               --telegram-id 910001 \
               --telegram-username deploy_smoke_seller && \
             ./.venv/bin/python -m services.bot_api.main \
               --buyer-command '/start' \
               --telegram-id 910002 \
               --telegram-username deploy_smoke_buyer"
