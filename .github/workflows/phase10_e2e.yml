name: Phase10 E2E Harness

on:
  push:
    branches: ["main"]
    paths:
      - "services/bot_api/**"
      - "libs/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/phase10_e2e.yml"
  pull_request:
    paths:
      - "services/bot_api/**"
      - "libs/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/phase10_e2e.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phase10-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run phase10 harness tests
        run: |
          python -m pytest -q tests/test_phase10_e2e_harness.py \
            --junitxml=phase10-e2e-harness.xml

      - name: Upload phase10 harness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase10-e2e-harness-report
          path: phase10-e2e-harness.xml
