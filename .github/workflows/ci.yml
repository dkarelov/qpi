name: CI

on:
  pull_request:
    paths:
      - "services/**"
      - "libs/**"
      - "tests/**"
      - "schema/**"
      - "scripts/**"
      - "infra/cloud-init/runner.yaml.tftpl"
      - "infra/main.tf"
      - "infra/outputs.tf"
      - "infra/terraform.tfvars"
      - "infra/terraform.tfvars.example"
      - "infra/variables.tf"
      - "infra/scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "requirements.txt"
      - "Makefile"
      - ".github/actionlint.yaml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  PSQLDEF_VERSION: v3.9.8

jobs:
  determine-changes:
    runs-on: ubuntu-latest
    outputs:
      needs_db_validation: ${{ steps.detect.outputs.needs_db_validation }}
      requires_migration: ${{ steps.detect.outputs.requires_migration }}
      needs_private_runner: ${{ steps.detect.outputs.needs_private_runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine changed areas
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          eval "$("${GITHUB_WORKSPACE}/scripts/common/detect_ci_changes.sh" \
            --event-name "${EVENT_NAME}" \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}")"
          {
            echo "needs_db_validation=${needs_db_validation}"
            echo "requires_migration=${requires_migration}"
            echo "needs_private_runner=${needs_private_runner}"
          } >> "${GITHUB_OUTPUT}"

  lint-and-fast-tests:
    runs-on: ubuntu-latest
    needs: determine-changes
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-python-${{ steps.setup-python.outputs.python-version }}-uv-

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install CI lint tools
        run: |
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          if ! command -v shellcheck >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          if ! command -v actionlint >/dev/null 2>&1; then
            scripts/dev/install_actionlint.sh "${HOME}/.local/bin"
          fi

      - name: Configure private GitHub auth
        run: scripts/common/setup_private_git_auth.sh

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Verify generated requirements
        run: scripts/dev/export_requirements.sh --check

      - name: Lint Python
        run: uv run ruff check .

      - name: Lint workflows and shell scripts
        run: scripts/dev/check_ci_files.sh

      - name: Fast tests
        run: scripts/dev/test.sh fast

  start-private-runner:
    runs-on: ubuntu-latest
    needs:
      - determine-changes
      - lint-and-fast-tests
    if: >-
      ${{
        needs.determine-changes.outputs.needs_private_runner == 'true' &&
        (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
      }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      PRIVATE_RUNNER_INSTANCE_NAME: ${{ vars.PRIVATE_RUNNER_INSTANCE_NAME }}
      PRIVATE_RUNNER_SSH_USER: ${{ vars.PRIVATE_RUNNER_SSH_USER }}
      PRIVATE_RUNNER_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_RUNNER_SSH_PRIVATE_KEY }}
      PRIVATE_RUNNER_BOOTSTRAP_TOKEN: ${{ secrets.PRIVATE_RUNNER_BOOTSTRAP_TOKEN }}
      PRIVATE_RUNNER_REPO: ${{ github.repository }}
      PRIVATE_RUNNER_LABELS: ${{ vars.PRIVATE_RUNNER_LABELS }}
      PRIVATE_RUNNER_VERSION: ${{ vars.PRIVATE_RUNNER_VERSION }}
      PRIVATE_RUNNER_IDLE_SHUTDOWN_MINUTES: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required runner secrets
        run: |
          test -n "${YC_TOKEN}" || { echo "YC_TOKEN is required"; exit 1; }
          test -n "${YC_FOLDER_ID}" || { echo "YC_FOLDER_ID is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_INSTANCE_NAME}" || { echo "PRIVATE_RUNNER_INSTANCE_NAME is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_SSH_PRIVATE_KEY}" || { echo "PRIVATE_RUNNER_SSH_PRIVATE_KEY is required"; exit 1; }
          test -n "${PRIVATE_RUNNER_BOOTSTRAP_TOKEN}" || { echo "PRIVATE_RUNNER_BOOTSTRAP_TOKEN is required"; exit 1; }

      - name: Install yc CLI
        run: |
          curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "${HOME}/yandex-cloud" -n
          echo "${HOME}/yandex-cloud/bin" >> "${GITHUB_PATH}"

      - name: Start private runner
        run: scripts/deploy/private_runner.sh ensure-ready

  private-db-validation:
    runs-on: [self-hosted, linux, qpi-private]
    needs:
      - determine-changes
      - start-private-runner
    if: >-
      ${{
        needs.determine-changes.outputs.needs_db_validation == 'true' &&
        (github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false))
      }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.TOKEN_YC_JSON_LOGGER }}
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      TEST_SCRATCH_DATABASE_URL: ${{ secrets.TEST_SCRATCH_DATABASE_URL }}
      QPI_DB_VM_HOST: ${{ vars.DB_VM_HOST }}
      QPI_DB_VM_SSH_USER: ${{ vars.DB_VM_SSH_USER }}
      QPI_DB_VM_SSH_PRIVATE_KEY: ${{ secrets.DB_VM_SSH_PRIVATE_KEY }}
      REQUIRES_MIGRATION: ${{ needs.determine-changes.outputs.requires_migration }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Ensure uv
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          if ! command -v uv >/dev/null 2>&1; then
            curl -LsSf https://astral.sh/uv/install.sh | sh
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Ensure psqldef
        run: |
          if ! command -v psqldef >/dev/null 2>&1; then
            curl -fsSL -o /tmp/psqldef.tar.gz \
              "https://github.com/sqldef/sqldef/releases/download/${PSQLDEF_VERSION}/psqldef_linux_amd64.tar.gz"
            tar -xzf /tmp/psqldef.tar.gz -C /tmp
            sudo install -m 0755 /tmp/psqldef /usr/local/bin/psqldef
          fi

      - name: Configure private GitHub auth
        run: scripts/common/setup_private_git_auth.sh

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Validate required DB settings
        run: |
          test -n "${TEST_DATABASE_URL}" || { echo "TEST_DATABASE_URL is required"; exit 1; }
          test -n "${QPI_DB_VM_HOST}" || { echo "DB_VM_HOST is required"; exit 1; }
          test -n "${QPI_DB_VM_SSH_PRIVATE_KEY}" || { echo "DB_VM_SSH_PRIVATE_KEY is required"; exit 1; }

      - name: DB-backed validation
        run: |
          scripts/dev/run_db_tests_on_runner.sh integration
          scripts/dev/run_db_tests_on_runner.sh schema-compat
          if [[ "${REQUIRES_MIGRATION}" == "true" ]]; then
            scripts/dev/run_db_tests_on_runner.sh migration-smoke
          fi

  stop-private-runner:
    runs-on: ubuntu-latest
    needs:
      - start-private-runner
      - private-db-validation
    if: ${{ always() && needs.start-private-runner.result == 'success' }}
    concurrency:
      group: qpi-private-runner
      cancel-in-progress: false
    env:
      YC_TOKEN: ${{ secrets.YC_TOKEN }}
      YC_FOLDER_ID: ${{ vars.YC_FOLDER_ID }}
      PRIVATE_RUNNER_INSTANCE_NAME: ${{ vars.PRIVATE_RUNNER_INSTANCE_NAME }}
      PRIVATE_RUNNER_SSH_USER: ${{ vars.PRIVATE_RUNNER_SSH_USER }}
      PRIVATE_RUNNER_SSH_PRIVATE_KEY: ${{ secrets.PRIVATE_RUNNER_SSH_PRIVATE_KEY }}
      PRIVATE_RUNNER_IDLE_SHUTDOWN_MINUTES: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install yc CLI
        run: |
          curl -fsSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash -s -- -i "${HOME}/yandex-cloud" -n
          echo "${HOME}/yandex-cloud/bin" >> "${GITHUB_PATH}"

      - name: Schedule runner shutdown
        run: scripts/deploy/private_runner.sh schedule-stop
