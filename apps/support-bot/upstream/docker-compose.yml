# Telegram Support Bot
# Requires shared infrastructure: docker compose -f docker-compose.infra.yml up -d

services:
  support-bot:
    build:
      context: .
    container_name: hm-support-bot
    command: sh -c "cd /usr/src/app && python -m app"
    restart: always
    volumes:
      - .:/usr/src/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
